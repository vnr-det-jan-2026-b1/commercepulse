version: "3.9"

# ──────────────────────────────────────────────────────────────
# CommercePulse — Supabase + Celery + Redis Edition
#
# Services:
#   redis          — Message broker + Celery result backend
#   ingestion      — FastAPI app (host network mode → reaches Supabase)
#   celery_worker  — Processes embedding tasks from the queue
#   celery_beat    — Schedules nightly re-embed at 2:00 AM IST
#
# network_mode: host is required for ingestion/celery on Windows
# so they can reach external Supabase. Redis uses bridged network.
# ──────────────────────────────────────────────────────────────

services:

  # ── Redis — Message Broker ──────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: commercepulse_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── FastAPI — Ingestion + Analytics API ────────────────────
  ingestion:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: commercepulse_ingestion
    restart: unless-stopped
    network_mode: host # ← shares host network → reaches Supabase + Redis on localhost
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db.gwwhksdelequvapksgqx.supabase.co
      POSTGRES_PORT: 5432
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-Abhilash@142}
      APP_ENV: ${APP_ENV:-development}
      API_KEY: ${API_KEY:-dev-api-key}
      REDIS_URL: redis://localhost:6379/0 # localhost because network_mode: host
    volumes:
      - ./app:/app/app:ro
      - model_cache:/root/.cache/huggingface
    depends_on:
      redis:
        condition: service_healthy

  # ── Celery Worker — Processes Embedding Tasks ───────────────
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: commercepulse_worker
    restart: unless-stopped
    network_mode: host # ← same reason — needs to reach Supabase + Redis
    command: >
      celery -A workers.celery_app worker
        --loglevel=info
        --queues=embed
        --concurrency=1
        --hostname=worker@%h
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db.gwwhksdelequvapksgqx.supabase.co
      POSTGRES_PORT: 5432
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-Abhilash@142}
      APP_ENV: ${APP_ENV:-development}
      REDIS_URL: redis://localhost:6379/0
    volumes:
      - ./app:/app/app:ro
      - ./workers:/app/workers:ro
      - model_cache:/root/.cache/huggingface
    depends_on:
      redis:
        condition: service_healthy

  # ── Celery Beat — Nightly Scheduler ────────────────────────
  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: commercepulse_beat
    restart: unless-stopped
    network_mode: host
    command: >
      celery -A workers.celery_app beat
        --loglevel=info
        --scheduler celery.beat:PersistentScheduler
        --schedule /tmp/celerybeat-schedule
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db.gwwhksdelequvapksgqx.supabase.co
      POSTGRES_PORT: 5432
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-Abhilash@142}
      APP_ENV: ${APP_ENV:-development}
      REDIS_URL: redis://localhost:6379/0
    volumes:
      - celery_beat_data:/tmp
    depends_on:
      redis:
        condition: service_healthy

volumes:
  model_cache:
  celery_beat_data:
